name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04        # 使用 22.04，比 20.04 更容易分配到 runner
    timeout-minutes: 180         # 充足时间

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk \
          python3-pip autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev cmake \
          libffi-dev libssl-dev

    # ★★★ 关键步骤：安装旧版 autoconf 和 libtool ★★★
    # 原因：Ubuntu 22.04 自带的 autoconf 2.71 与 NDK 25c 的 libffi 不兼容
    - name: Install autoconf 2.69 and libtool 2.4.6
      run: |
        # 下载并编译 autoconf 2.69
        wget https://ftp.gnu.org/gnu/autoconf/autoconf-2.69.tar.gz
        tar xzf autoconf-2.69.tar.gz
        cd autoconf-2.69
        ./configure --prefix=/usr/local/autoconf-2.69
        make
        sudo make install
        cd ..
        # 下载并编译 libtool 2.4.6
        wget https://ftp.gnu.org/gnu/libtool/libtool-2.4.6.tar.gz
        tar xzf libtool-2.4.6.tar.gz
        cd libtool-2.4.6
        ./configure --prefix=/usr/local/libtool-2.4.6
        make
        sudo make install
        cd ..
        # 将旧版工具加入 PATH，优先于系统默认
        echo "/usr/local/autoconf-2.69/bin" >> $GITHUB_PATH
        echo "/usr/local/libtool-2.4.6/bin" >> $GITHUB_PATH
        # 验证版本
        export PATH=/usr/local/autoconf-2.69/bin:/usr/local/libtool-2.4.6/bin:$PATH
        autoconf --version
        libtool --version

    - name: Install Buildozer and Cython
      run: |
        pip3 install --upgrade pip
        pip3 install buildozer cython

    - name: Cache Buildozer global
      uses: actions/cache@v3
      with:
        path: ~/.buildozer
        key: buildozer-global-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          buildozer-global-

    - name: Build APK (with retry)
      run: |
        export PATH=/usr/local/autoconf-2.69/bin:/usr/local/libtool-2.4.6/bin:$PATH
        for i in {1..3}; do
          yes | buildozer -v android debug && break || sleep 60
        done

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: tv-player-apk
        path: bin/*.apk
