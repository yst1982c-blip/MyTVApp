name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk \
          python3-pip autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev cmake \
          libffi-dev libssl-dev

    - name: Install autoconf 2.69 (for NDK compatibility)
      run: |
        sudo apt remove -y autoconf
        wget https://ftp.gnu.org/gnu/autoconf/autoconf-2.69.tar.gz
        tar xzf autoconf-2.69.tar.gz
        cd autoconf-2.69
        ./configure --prefix=/usr
        make
        sudo make install
        cd ..
        autoconf --version

    - name: Install Buildozer and Cython
      run: |
        pip3 install --upgrade pip
        pip3 install buildozer cython

    - name: Cache Buildozer
      uses: actions/cache@v3
      with:
        path: ~/.buildozer
        key: buildozer-global-${{ hashFiles('buildozer.spec') }}

    - name: Build APK
      run: |
        export PATH=/usr/bin:$PATH
        yes | buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: tv-player-apk
        path: bin/*.apk
